name: Get Citation Data

on:
 workflow_dispatch: 
 page_build: 
 schedule:
  - cron:  '0 8 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
          fetch-depth: 0
    - name: Install Reqs
      run: |
        sudo apt-get install python3-setuptools
    # - name: Run
    #   run: |
    #     cd ./google_scholar_crawler
    #     pip3 install -r requirements.txt
    #     python3 main.py
    #     cd ./results
    #     git init
    #     git config --local user.name "${GITHUB_ACTOR}"
    #     export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
    #     git add *.json
    #     git commit -m "Updated Citation Data"
    #     git push origin main HEAD:google-scholar-stats --force
    #   env: 
    #     GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}

    - name: Run crawler and copy JSON
      run: |
        cd google_scholar_crawler
        pip3 install -r requirements.txt
        python3 main.py
        cp results/gs_data.json ../gs_data.json
        chmod 644 ../gs_data.json
      env:
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}

    - name: Debug show copied file
      run: |
        ls -la
        echo '--- gs_data.json ---'
        head -n 40 ./gs_data.json || true

    - name: Commit and push updated gs_data.json
      run: |
        git config user.name "${GITHUB_ACTOR}"
        git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
        git add gs_data.json
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m 'chore(ci): update gs_data.json'
        git push origin HEAD:main

